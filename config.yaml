# Databricks x Dify Integration - 設定ファイル
# 各自の環境に合わせて値を設定してください。

# ========== Databricks Unity Catalog ==========
catalog: "yao_sl_st_catalog"
schema: "dify_integration"
volume_name: "raw_data"

# ========== Vector Search ==========
vector_search_endpoint_name: "dify_vs_endpoint"
vector_search_index_name: "knowledge_base_vs_index"
embedding_model_name: "databricks-qwen3-embedding-0-6b"

# ========== LLM ==========
llm_endpoint_name: "databricks-gpt-5-2"
ai_gateway_url: "https://7474654222866971.ai-gateway.cloud.databricks.com/mlflow/v1"

# ========== MLflow / Observability ==========
mlflow_experiment_name: "dify_integration_tracing"
obs_schema: "dify_observability"                  # トレース保存用スキーマ（例: dify_observability）
delta_sync_table: "mlflow_trace_log_delta_sync"   # Delta Syncテーブル名（例: mlflow_trace_log_delta_sync）

# ========== Dify ==========
dify_admin_email: "admin@dify-demo.local"
dify_admin_password: "DifyDemo2026!"

# ========== Genie ==========
genie_space_id: ""       # Genie Space ID（Pattern 2/3で使用）
