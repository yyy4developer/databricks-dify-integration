bundle:
  name: databricks-dify-integration

workspace:
  host: https://fevm-yao-sl-st.cloud.databricks.com

variables:
  cluster_id:
    description: "Cluster ID for running notebooks"
    default: ""

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  prod:
    mode: production
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}

sync:
  include:
    - "notebooks/**"
  exclude:
    - "dify/**"
    - ".venv/**"
    - "docs/**"
